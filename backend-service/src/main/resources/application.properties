spring.application.name=backend-service

# --- Actuator: what we expose over HTTP ---
# By default only /actuator/health is web-exposed. We add "info", "metrics"
# and "prometheus" (the scrape endpoint Prometheus reads in Week 4).
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Show the full health breakdown (disk space, ping, etc.), not just "UP".
management.endpoint.health.show-details=always

# Tag every metric with the instance id so Prometheus/Grafana can break
# figures down per backend. Uses the same resolution as InstanceInfo.
management.metrics.tags.instance=${instance.id:${HOSTNAME:local}}

# --- Logging: prepend instance id + request id to every line ---
# %X{requestId} pulls the value the RequestIdFilter put in the MDC.
logging.pattern.level=%5p [${instance.id:${HOSTNAME:local}}] [%X{requestId:-}]
